name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install Cordova
      run: npm install -g cordova
      
    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Create dummy icons
      run: |
        mkdir -p res/icon/android
        echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > res/icon/android/hdpi.png
        cp res/icon/android/hdpi.png res/icon/android/mdpi.png
        cp res/icon/android/hdpi.png res/icon/android/xhdpi.png
        cp res/icon/android/hdpi.png res/icon/android/xxhdpi.png
        cp res/icon/android/hdpi.png res/icon/android/xxxhdpi.png
        cp res/icon/android/hdpi.png res/icon/android/icon.png
        
    - name: Install Bluetooth Plugin
      run: |
        cordova plugin add cordova-plugin-bluetooth-serial
        
    - name: Add Android Platform (version 12 for stability)
      run: cordova platform add android@12
      
    - name: Build Debug APK
      run: cordova build android --debug --verbose
      
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: Grid-EV-Monitor
        path: platforms/android/app/build/outputs/apk/debug/
        if-no-files-found: error
